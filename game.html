<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Runner Game (Fully Fixed Input)</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: #111;
}

/* CRITICAL MOBILE FIX */
canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    touch-action: none; /* stops Android from stealing taps */
    user-select: none;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<script>

// ================= CANVAS =================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// ================= GAME SETTINGS =================
const GRAVITY = 0.30;
const JUMP = -11;
const SPEED = 2.7;

function groundY() {
    return canvas.height * 0.85;
}

// ================= STATE =================
let spikes = [];
let passed = new Set();
let lastX = 300;
let nextSpawn = 0;

let score = 0;
let highScore = 0;

// ================= PLAYER =================
const player = {
    x: 100,
    y: 0,
    w: 30,
    h: 30,
    vy: 0,
    onGround: false,
    alive: true
};

function resetPlayer() {
    player.y = groundY() - player.h;
    player.vy = 0;
    player.alive = true;
}

// ================= HELPERS =================
function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function scheduleSpawn() {
    nextSpawn = Date.now() + rand(900, 1600);
}

function spawnCluster() {
    lastX += rand(170, 260);

    const id = Math.random().toString(36).slice(2);
    const count = rand(2, 3);

    for (let i = 0; i < count; i++) {
        spikes.push({
            x: lastX + i * 40,
            y: groundY() - 40,
            size: 40,
            id: id
        });
    }

    lastX += count * 40;
}

function resetWorld() {
    spikes = [];
    passed.clear();
    lastX = 300;
    score = 0;
    scheduleSpawn();
    resetPlayer();
}

// ================= 🔥 INPUT (FIXED FOR ANDROID + CHROMEBOOK + PC) =================
function jump(e) {
    if (e) e.preventDefault();

    if (player.onGround && player.alive) {
        player.vy = JUMP;
        player.onGround = false;
    }
}

// 📱 MOBILE + ANDROID (THIS IS THE KEY FIX)
canvas.addEventListener("pointerdown", jump, { passive: false });

// fallback for older Android browsers
canvas.addEventListener("touchstart", jump, { passive: false });

// 💻 KEYBOARD (PC + CHROMEBOOK)
window.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.code === "ArrowUp") {
        e.preventDefault();
        jump();
    }

    if (e.code === "KeyR") {
        resetWorld();
    }
});

// ================= COLLISION =================
function hit(a, b) {
    return a.x < b.x + b.size &&
           a.x + a.w > b.x &&
           a.y < b.y + b.size &&
           a.y + a.h > b.y;
}

// ================= UPDATE =================
function update() {

    if (Date.now() >= nextSpawn) {
        spawnCluster();
        scheduleSpawn();
    }

    for (let s of spikes) {
        s.x -= SPEED;
    }

    spikes = spikes.filter(s => s.x + s.size > 0);

    if (player.alive) {

        player.vy += GRAVITY;
        player.y += player.vy;

        let g = groundY();

        if (player.y + player.h >= g) {
            player.y = g - player.h;
            player.vy = 0;
            player.onGround = true;
        }

        for (let s of spikes) {
            if (hit(player, s)) {
                player.alive = false;
            }
        }
    }

    for (let s of spikes) {
        if (!passed.has(s.id)) {
            if (s.x + s.size < player.x) {
                passed.add(s.id);
                score++;
            }
        }
    }

    if (!player.alive) {
        if (score > highScore) highScore = score;
        resetWorld();
    }
}

// ================= DRAW =================
function drawSpike(s) {
    ctx.fillStyle = "#ff4444";
    ctx.beginPath();
    ctx.moveTo(s.x, s.y + s.size);
    ctx.lineTo(s.x + s.size / 2, s.y);
    ctx.lineTo(s.x + s.size, s.y + s.size);
    ctx.closePath();
    ctx.fill();
}

function draw() {
    ctx.fillStyle = "#141414";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#555";
    ctx.fillRect(0, groundY(), canvas.width, canvas.height);

    for (let s of spikes) drawSpike(s);

    ctx.fillStyle = "#66ccff";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Score: " + score, 10, 25);
    ctx.fillText("High: " + highScore, 10, 50);
}

// ================= LOOP =================
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// ================= START =================
scheduleSpawn();
resetPlayer();
loop();

</script>

</body>
</html>
