<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Runner Game (Mobile Friendly Rewrite)</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #111;
    touch-action: none;
    overscroll-behavior: none;
}

canvas {
    display: block;
}
button {
    position: fixed;
    top: 10px;
    z-index: 1000;
    padding: 10px 14px;
    background: #333;
    color: white;
    border: none;
}
</style>
</head>

<body>

<button id="fsBtn" style="left:10px;">Fullscreen</button>
<button id="pauseBtn" style="left:120px;">Pause</button>

<canvas id="game"></canvas>

<script>

// ================= CANVAS =================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// ================= FULLSCREEN =================
document.getElementById("fsBtn").onclick = () => {
    if (!document.fullscreenElement) canvas.requestFullscreen();
    else document.exitFullscreen();
};

// ================= PAUSE =================
let paused = false;
document.getElementById("pauseBtn").onclick = () => {
    paused = !paused;
    document.getElementById("pauseBtn").innerText = paused ? "Resume" : "Pause";
};

// ================= GAME SETTINGS =================
const GRAVITY = 0.30;
const JUMP = -11;
const SPEED = 2.7;

function GROUND_Y() {
    return canvas.height * 0.85;
}

// ================= GAME STATE =================
let score = 0;
let highScore = 0;

let spikes = [];
let passed = new Set();
let lastX = 300;
let nextSpawn = 0;

// ================= PLAYER =================
const player = {
    x: 100,
    y: 0,
    w: 30,
    h: 30,
    velY: 0,
    onGround: false,
    alive: true
};

// ================= RESET PLAYER =================
function resetPlayer() {
    player.y = GROUND_Y() - player.h;
    player.velY = 0;
    player.alive = true;
}

// ================= HELPERS =================
function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function scheduleSpawn() {
    nextSpawn = Date.now() + rand(900, 1600);
}

function spawnCluster() {
    lastX += rand(170, 260);

    let id = Math.random().toString(36).substr(2, 5);
    let count = rand(2, 3);

    for (let i = 0; i < count; i++) {
        spikes.push({
            x: lastX + i * 40,
            y: GROUND_Y() - 40,
            size: 40,
            id: id
        });
    }

    lastX += count * 40;
}

// ================= RESET WORLD =================
function resetWorld() {
    spikes = [];
    passed.clear();
    lastX = 300;
    score = 0;
    scheduleSpawn();
    resetPlayer();
}

// ================= INPUT (MOBILE FIXED) =================
function jump(e) {
    if (e) e.preventDefault();

    if (player.onGround && player.alive && !paused) {
        player.velY = JUMP;
    }
}

// ⭐ UNIVERSAL INPUT (FIXED MOBILE ISSUE)
document.addEventListener("pointerdown", jump, { passive: false });
document.addEventListener("keydown", e => {
    if (e.code === "Space") jump();
});

// ================= COLLISION =================
function hit(a, b) {
    return a.x < b.x + b.size &&
           a.x + a.w > b.x &&
           a.y < b.y + b.size &&
           a.y + a.h > b.y;
}

// ================= UPDATE =================
function update() {

    if (paused) return;

    // spawn spikes
    if (Date.now() >= nextSpawn) {
        spawnCluster();
        scheduleSpawn();
    }

    // move spikes
    for (let s of spikes) {
        s.x -= SPEED;
    }

    spikes = spikes.filter(s => s.x + s.size > 0);

    // player physics
    if (player.alive) {

        player.velY += GRAVITY;
        player.y += player.velY;

        let ground = GROUND_Y();

        if (player.y + player.h >= ground) {
            player.y = ground - player.h;
            player.velY = 0;
            player.onGround = true;
        } else {
            player.onGround = false;
        }

        // collision
        for (let s of spikes) {
            if (hit(player, s)) {
                player.alive = false;
            }
        }
    }

    // scoring
    for (let s of spikes) {
        if (!passed.has(s.id)) {
            if (s.x + s.size < player.x) {
                passed.add(s.id);
                score++;
            }
        }
    }

    // reset on death
    if (!player.alive) {
        if (score > highScore) highScore = score;
        resetWorld();
    }
}

// ================= DRAW =================
function drawSpike(s) {
    ctx.fillStyle = "#ff4444";
    ctx.beginPath();
    ctx.moveTo(s.x, s.y + s.size);
    ctx.lineTo(s.x + s.size / 2, s.y);
    ctx.lineTo(s.x + s.size, s.y + s.size);
    ctx.closePath();
    ctx.fill();
}

function draw() {
    ctx.fillStyle = "#141414";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // ground
    ctx.fillStyle = "#555";
    ctx.fillRect(0, GROUND_Y(), canvas.width, canvas.height);

    // spikes
    for (let s of spikes) drawSpike(s);

    // player
    ctx.fillStyle = player.alive ? "#66ccff" : "#ff6666";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    // UI
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Score: " + score, 10, 25);
    ctx.fillText("High: " + highScore, 10, 50);

    if (paused) {
        ctx.font = "40px Arial";
        ctx.fillText("PAUSED", canvas.width/2 - 90, canvas.height/2);
    }
}

// ================= LOOP =================
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// ================= START =================
scheduleSpawn();
resetPlayer();
loop();

</script>

</body>
</html>
